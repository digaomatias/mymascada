app = 'mymascada-web'
primary_region = 'syd'

[build]
  dockerfile = 'Dockerfile'

  [build.args]
    NEXT_PUBLIC_API_URL = 'https://api.mymascada.com'
    INTERNAL_API_URL = 'https://api.mymascada.com'

[env]
  NODE_ENV = 'production'
  NEXT_TELEMETRY_DISABLED = '1'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[http_service.checks]]
  grace_period = "15s"
  interval = "30s"
  method = "GET"
  path = "/"
  timeout = "5s"

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
